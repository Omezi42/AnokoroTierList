<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anokoro Tier Pro</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
  
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
  <nav>
    <div class="logo-container">
      <div class="logo-icon">A</div>
      <div class="logo-text">AnokoroTierPro</div>
    </div>
    
    <div class="nav-links">
      <button class="nav-btn active" data-view="icon-maker">作成</button>
      <button class="nav-btn" data-view="tier-list">Tier表</button>
      <button class="nav-btn" data-view="matchup">相性表</button>
      <button class="nav-btn" data-view="plotter">分布図</button>
    </div>
    
    <div class="flex gap-2">
      <button class="btn btn-secondary" onclick="exportAsImage()">画像保存</button>
      <button class="btn btn-primary" id="save-btn">保存</button>
    </div>
  </nav>

  <main>
    <!-- View: Icon Maker -->
    <section id="icon-maker" class="view-container active">
      <header>
        <h1>アイコン生成</h1>
        <p class="text-muted">カードを組み合わせてデッキアイコンを作成します。</p>
      </header>
      
      <div class="maker-grid">
        <div class="search-col">
          <h3 class="mb-4">背景を選択</h3>
          <input type="text" id="bg-search" placeholder="検索...">
          <div class="scroll-box mt-4">
            <div id="bg-results" class="card-grid"></div>
          </div>
        </div>

        <div class="search-col">
          <h3 class="mb-4">サブカードを選択</h3>
          <input type="text" id="sub-search" placeholder="検索...">
          <div class="scroll-box mt-4">
            <div id="sub-results" class="card-grid"></div>
          </div>
        </div>

        <div class="preview-col">
          <div class="sticky-preview">
            <h3 class="mb-4">プレビュー</h3>
            <canvas id="icon-canvas" width="512" height="512" class="mb-4"></canvas>
            <div class="flex flex-col gap-2">
              <button class="btn btn-primary w-full" onclick="addIconToInventory()">インベントリに追加</button>
              <button class="btn btn-secondary w-full" onclick="downloadIcon()">画像をダウンロード</button>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-12">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">インベントリ</h2>
          <button class="btn btn-secondary text-xs" onclick="clearInventory()">クリア</button>
        </div>
        <div id="icon-inventory" class="inventory-tray"></div>
      </div>
    </section>

    <!-- View: Tier List -->
    <section id="tier-list" class="view-container">
      <header>
        <h1>Tier表</h1>
        <p class="text-muted">アイコンをドラッグして配置します。</p>
      </header>
      
      <div id="tier-capture-area">
        <div id="tier-rows-container" class="tier-list"></div>
      </div>

      <div class="mt-8 grid grid-cols-1 md:grid-cols-4 gap-8">
        <div>
          <button class="btn btn-secondary w-full" onclick="addTierRow()">+ 行を追加</button>
        </div>
        <div class="md:col-span-3">
          <h4 class="mb-4 text-muted uppercase text-xs font-bold">アイコン</h4>
          <div id="tier-inventory" class="inventory-tray"></div>
        </div>
      </div>
    </section>

    <!-- View: Matchup -->
    <section id="matchup" class="view-container">
      <header>
        <h1>相性表</h1>
        <p class="text-muted">アイコンをクリックして追加します。</p>
      </header>
      
      <div id="matchup-capture-area">
        <div class="table-container">
          <table class="matchup-table" id="matchup-table">
            <thead>
              <tr id="matchup-header">
                <th>デッキ</th>
              </tr>
            </thead>
            <tbody id="matchup-body"></tbody>
          </table>
        </div>
      </div>

      <div class="mt-8">
        <h4 class="mb-4 text-muted uppercase text-xs font-bold">追加するアイコンを選択</h4>
        <div id="matchup-inventory" class="inventory-tray"></div>
      </div>
    </section>

    <!-- View: Plotter -->
    <section id="plotter" class="view-container">
      <header>
        <h1>分布図</h1>
        <p class="text-muted">軸を設定してデッキを配置します。</p>
      </header>
      
      <div id="plotter-capture-area">
        <div class="flex gap-8 mb-6">
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold">縦軸:</span>
            <input type="text" id="axis-y-label" value="速度" style="width: 100px;">
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold">横軸:</span>
            <input type="text" id="axis-x-label" value="安定感" style="width: 100px;">
          </div>
        </div>
        
        <div class="plot-area" id="plot-area">
          <div class="axis-x"></div>
          <div class="axis-y"></div>
        </div>
      </div>

      <div class="mt-8">
        <h4 class="mb-4 text-muted uppercase text-xs font-bold">インベントリ</h4>
        <div id="plot-inventory" class="inventory-tray"></div>
      </div>
    </section>
  </main>

  <footer class="text-center py-12 border-t mt-20 text-muted text-sm">
    <p>&copy; 2026 Anokoro Tier Pro</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
