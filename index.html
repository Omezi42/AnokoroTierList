<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anokoro Tier Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
  <div class="app-container">
    <aside>
      <div class="brand-text">ANOKORO<span style="color: var(--primary)">TIER</span></div>
      <div class="side-nav">
        <button class="side-btn active" data-view="icon-maker">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          アイコン作成
        </button>
        <button class="side-btn" data-view="tier-list">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          Tier表
        </button>
        <button class="side-btn" data-view="matchup">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.91 5.89h6.19l-5.01 3.64 1.91 5.89-5-3.64-5 3.64 1.91-5.89-5.01-3.64h6.19z"></path></svg>
          相性表
        </button>
        <button class="side-btn" data-view="plotter">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><circle cx="9" cy="9" r="2"></circle><circle cx="15" cy="13" r="2"></circle><circle cx="11" cy="17" r="2"></circle></svg>
          分布図
        </button>
      </div>
      <div class="mt-auto">
        <!-- Banner removed -->
      </div>
    </aside>

    <main>
      <div class="top-bar">
        <div class="text-lg font-black" id="current-view-name">アイコン作成</div>
        <div class="flex gap-3">
          <button class="btn btn-ghost" onclick="exportAsImage()">画像保存</button>
          <button class="btn btn-primary" id="save-btn">クラウド保存</button>
        </div>
      </div>

      <!-- View: Icon Maker -->
      <section id="icon-maker" class="view-container active">
        <div style="display: grid; grid-template-columns: 1fr 1fr 480px; gap: 2.5rem;">
          <div class="card-glass">
            <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">1. 背景選択</h3>
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="bg-search" placeholder="カードを検索...">
            </div>
            <div id="bg-results" class="search-results-box"></div>
          </div>

          <div class="card-glass">
            <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">2. サブ選択</h3>
            <div class="input-group">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="sub-search" placeholder="カードを検索...">
            </div>
            <div id="sub-results" class="search-results-box"></div>
          </div>

          <div class="text-center">
            <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">プレビュー</h3>
            <canvas id="icon-canvas" width="512" height="512" style="width: 100%; border-radius: 24px; box-shadow: var(--shadow-lg);" class="mb-6"></canvas>
            <div class="flex flex-col gap-3">
              <button class="btn btn-primary w-full" onclick="addIconToInventory()">インベントリに追加</button>
              <button class="btn btn-ghost w-full" onclick="downloadIcon()">PNG保存</button>
            </div>
          </div>
        </div>

        <div class="inventory-container">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">インベントリ</h2>
            <div class="flex gap-4">
              <label class="btn btn-ghost text-xs cursor-pointer">
                画像をアップロード
                <input type="file" id="custom-upload" hidden accept="image/*" onchange="handleCustomUpload(this)">
              </label>
              <button class="btn btn-ghost text-xs text-rose-500" onclick="clearInventory()">クリア</button>
            </div>
          </div>
          <div class="tray-wrapper">
            <div id="icon-inventory" class="tray-grid"></div>
          </div>
        </div>
      </section>

      <!-- View: Tier List -->
      <section id="tier-list" class="view-container">
        <div class="flex justify-between items-center mb-8">
           <div class="flex gap-4 items-center">
              <h2 class="text-2xl font-black">Tier List Editor</h2>
              <select onchange="applyTierPreset(this.value)">
                <option value="">テンプレートを選択...</option>
                <option value="s-c">S-C (4段)</option>
                <option value="s-d">S-D (5段)</option>
                <option value="simple">3段階</option>
              </select>
           </div>
           <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-xl border border-slate-100 shadow-sm">
             <span class="text-[10px] font-black text-slate-400 uppercase">サイズ</span>
             <input type="range" min="40" max="100" value="64" style="width: 120px;" oninput="updateIconSize(this.value)">
           </div>
        </div>

        <div id="tier-capture-area">
          <div id="tier-rows-container" class="tier-editor"></div>
        </div>

        <div class="mt-12 grid grid-cols-4 gap-8">
          <button class="btn btn-ghost w-full h-16 text-lg border-dashed" onclick="addTierRow()">+ 行を追加</button>
          <div class="col-span-3">
             <h3 class="text-xs font-black text-slate-400 uppercase mb-4">アイコン・ライブラリ</h3>
             <div id="tier-inventory" class="tray-grid p-6 bg-slate-50 rounded-2xl border border-dashed border-slate-200"></div>
          </div>
        </div>
      </section>

      <!-- View: Matchup -->
      <section id="matchup" class="view-container">
        <div id="matchup-capture-area">
          <div class="overflow-hidden rounded-3xl border border-slate-100 bg-white shadow-lg">
            <table class="matchup-table" id="matchup-table" style="width: 100%; border-collapse: collapse;">
              <thead>
                <tr id="matchup-header" style="background: #f8fafc; border-bottom: 1px solid #f1f5f9;">
                  <th style="padding: 24px; text-align: left; font-size: 0.75rem; font-weight: 900; color: #94a3b8; text-transform: uppercase;">Meta Matrix</th>
                </tr>
              </thead>
              <tbody id="matchup-body"></tbody>
            </table>
          </div>
        </div>
        <div class="mt-12">
          <h3 class="text-xs font-black text-slate-400 uppercase mb-4">インベントリから追加</h3>
          <div id="matchup-inventory" class="tray-grid"></div>
        </div>
      </section>

      <!-- View: Plotter -->
      <section id="plotter" class="view-container">
        <div id="plotter-capture-area">
          <div class="flex gap-10 mb-8 bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
            <div class="flex flex-col gap-3 flex-1">
              <label class="text-[10px] font-black uppercase text-slate-400">縦軸ラベル (Y)</label>
              <input type="text" id="axis-y-label" value="速度" class="label-input">
            </div>
            <div class="flex flex-col gap-3 flex-1">
              <label class="text-[10px] font-black uppercase text-slate-400">横軸ラベル (X)</label>
              <input type="text" id="axis-x-label" value="安定感" class="label-input">
            </div>
          </div>
          
          <div class="plot-area" id="plot-area">
            <div class="plot-grid"></div>
            <div style="position: absolute; bottom: 50%; left: 0; right: 0; height: 1px; background: #e2e8f0;"></div>
            <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: #e2e8f0;"></div>
            <span id="label-top" style="position: absolute; top: 1.5rem; left: 51%; font-weight: 900; color: #94a3b8; font-size: 0.75rem;">速度 (+)</span>
            <span id="label-bottom" style="position: absolute; bottom: 1.5rem; left: 51%; font-weight: 900; color: #94a3b8; font-size: 0.75rem;">速度 (-)</span>
            <span id="label-right" style="position: absolute; right: 1.5rem; bottom: 51%; font-weight: 900; color: #94a3b8; font-size: 0.75rem;">安定感 (+)</span>
            <span id="label-left" style="position: absolute; left: 1.5rem; bottom: 51%; font-weight: 900; color: #94a3b8; font-size: 0.75rem;">安定感 (-)</span>
          </div>
        </div>
        <div class="mt-12">
          <h3 class="text-xs font-black text-slate-400 uppercase mb-4">アイコンを配置</h3>
          <div id="plot-inventory" class="tray-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
